<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>细胞分割系统 - Cellpose版</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .params-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .params-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .param-group {
            display: flex;
            flex-direction: column;
        }
        .param-group label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }
        .param-group input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .param-group small {
            color: #666;
            margin-top: 3px;
            font-size: 12px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>🔬 细胞分割分析系统 - Cellpose深度学习版</h1>
            <p>上传细胞图像，点击细胞查看详细参数</p>
        </header>

        <!-- 参数设置区域 -->
        <div class="params-section">
            <div class="section-title">⚙️ 参数设置</div>
            <div class="params-grid">
                <div class="param-group">
                    <label for="diameter">细胞直径 (像素)</label>
                    <input type="number" id="diameter" value="30" min="10" max="100" step="5">
                    <small>预期细胞直径</small>
                </div>
                <div class="param-group">
                    <label for="flowThreshold">Flow阈值</label>
                    <input type="number" id="flowThreshold" value="0.4" min="0" max="1" step="0.05">
                    <small>越高越严格</small>
                </div>
                <div class="param-group">
                    <label for="cellprobThreshold">细胞概率阈值</label>
                    <input type="number" id="cellprobThreshold" value="0.0" min="-6" max="6" step="0.5">
                    <small>细胞概率阈值</small>
                </div>
                <div class="param-group">
                    <label for="minArea">最小面积 (像素²)</label>
                    <input type="number" id="minArea" value="80" min="50" max="200" step="10">
                    <small>过滤小区域</small>
                </div>
                <div class="param-group">
                    <label for="maxArea">最大面积 (像素²)</label>
                    <input type="number" id="maxArea" value="1000" min="500" max="2000" step="100">
                    <small>过滤大区域</small>
                </div>
                <div class="param-group">
                    <label for="maxIntensity">最大灰度值</label>
                    <input type="number" id="maxIntensity" value="120" min="80" max="180" step="10">
                    <small>过滤高灰度背景</small>
                </div>
                <div class="param-group">
                    <label for="minCircularity">最小圆度</label>
                    <input type="number" id="minCircularity" value="0.20" min="0.1" max="0.5" step="0.05">
                    <small>圆度 = 4π×面积/周长²</small>
                </div>
            </div>
        </div>

        <!-- 上传区域 -->
        <div class="upload-section">
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <button id="uploadBtn" class="btn-primary">📁 选择图像</button>
            <span id="fileName"></span>
            <div id="loadingIndicator" class="loading" style="display: none;">
                <div class="spinner"></div>
                <span>正在使用Cellpose分割细胞...</span>
            </div>
        </div>

        <!-- 主内容区域 -->
        <div class="main-content">
            <!-- 左侧：图像显示区 -->
            <div class="image-panel">
                <div id="imageContainer" class="image-container">
                    <div class="placeholder">
                        <p>👆 请上传细胞图像开始分析</p>
                    </div>
                    <canvas id="imageCanvas"></canvas>
                </div>
                <div id="imageInfo" class="image-info" style="display: none;">
                    <span id="cellCount"></span>
                    <span id="imageSize"></span>
                </div>
            </div>

            <!-- 右侧：细胞信息面板 -->
            <div class="info-panel">
                <div id="cellInfoPlaceholder" class="info-placeholder">
                    <p>👈 点击左侧图像中的细胞查看详细信息</p>
                </div>

                <div id="cellInfoContent" class="cell-info-content" style="display: none;">
                    <h2>细胞 #<span id="cellLabel"></span></h2>

                    <!-- 细胞放大图 -->
                    <div class="cell-image-container">
                        <img id="cellImage" src="" alt="细胞放大图">
                    </div>

                    <!-- 参数表格 -->
                    <div class="parameters">
                        <h3>📊 形态学参数</h3>
                        <table class="param-table">
                            <tr>
                                <td class="param-name">长轴长度</td>
                                <td class="param-value" id="majorAxis">-</td>
                                <td class="param-unit">像素</td>
                            </tr>
                            <tr>
                                <td class="param-name">短轴长度</td>
                                <td class="param-value" id="minorAxis">-</td>
                                <td class="param-unit">像素</td>
                            </tr>
                            <tr>
                                <td class="param-name">圆度</td>
                                <td class="param-value" id="circularity">-</td>
                                <td class="param-unit"></td>
                            </tr>
                            <tr>
                                <td class="param-name">面积</td>
                                <td class="param-value" id="area">-</td>
                                <td class="param-unit">像素²</td>
                            </tr>
                            <tr>
                                <td class="param-name">周长</td>
                                <td class="param-value" id="perimeter">-</td>
                                <td class="param-unit">像素</td>
                            </tr>
                        </table>

                        <h3>📈 灰度统计</h3>
                        <table class="param-table">
                            <tr>
                                <td class="param-name">均值</td>
                                <td class="param-value" id="meanIntensity">-</td>
                                <td class="param-unit"></td>
                            </tr>
                            <tr>
                                <td class="param-name">方差</td>
                                <td class="param-value" id="variance">-</td>
                                <td class="param-unit"></td>
                            </tr>
                        </table>
                    </div>

                    <!-- 圆度指示器 -->
                    <div class="circularity-indicator">
                        <div class="indicator-label">圆度指示</div>
                        <div class="indicator-bar">
                            <div id="circularityBar" class="indicator-fill"></div>
                        </div>
                        <div class="indicator-text">
                            <span>不规则</span>
                            <span>完美圆形</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main_cellpose.js') }}"></script>
</body>
</html>
